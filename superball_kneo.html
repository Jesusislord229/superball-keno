<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Superball Keno</title>
<style>
    body {
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:Arial, sans-serif;
        color:white;
        background:
            linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.85)),
            url("highlimit-casino.jpg") center/cover no-repeat fixed;
    }
    .wrapper {
        display:flex;
        gap:20px;
    }
    .board {
        display:grid;
        grid-template-columns:repeat(10,55px);
        grid-template-rows:repeat(8,55px);
        gap:5px;
        background:radial-gradient(circle at top, #1b2f4f 0%, #050914 70%);
        padding:12px;
        border-radius:14px;
        box-shadow:0 0 30px #000;
        border:3px solid #d4af37;
    }
    .cell {
        display:flex;
        justify-content:center;
        align-items:center;
        background:#062013;
        border-radius:6px;
        cursor:pointer;
        font-weight:bold;
        font-size:18px;
        transition:0.15s;
        color:#00ff3b;
        text-shadow:0 0 4px #000;
        position:relative;
        overflow:hidden;
    }
    .cell.selected {
        background:#ffd93b;
        color:black;
    }
    .cell.drawn {
        background:#7a2bcb;
        color:#f7e9ff;
        box-shadow:0 0 10px #b46cff;
    }
    .cell.hit {
        background:#ff4b2b;
        color:white;
        box-shadow:0 0 12px #ff4b2b;
    }
    .cell.superball {
        animation:bounce 0.6s ease-out;
    }
    .cell.superball::after {
        content:"";
        position:absolute;
        inset:2px;
        border-radius:8px;
        border:3px solid white;
        box-shadow:0 0 14px white, 0 0 22px #ff8800;
        animation:fire 0.6s ease-out;
    }
    @keyframes bounce {
        0% { transform:scale(1); }
        30% { transform:scale(1.2); }
        60% { transform:scale(0.9); }
        100% { transform:scale(1); }
    }
    @keyframes fire {
        0% { opacity:0; }
        30% { opacity:1; }
        100% { opacity:0.6; }
    }

    .right-column {
        display:flex;
        flex-direction:column;
        gap:10px;
    }

    .panel {
        width:290px;
        background:linear-gradient(#222b45,#050914);
        padding:15px;
        border-radius:14px;
        box-shadow:0 0 30px #000;
        border:3px solid #d4af37;
    }
    .row {
        display:flex;
        justify-content:space-between;
        margin-bottom:6px;
        font-size:16px;
    }
    .bet-row {
        display:flex;
        flex-wrap:wrap;
        gap:4px;
        margin-top:4px;
    }
    .bet-btn {
        flex:1 1 30%;
        padding:4px 0;
        font-size:12px;
        border:none;
        border-radius:4px;
        background:#22344a;
        color:white;
        cursor:pointer;
    }
    .bet-btn.active {
        background:#ffd93b;
        color:black;
        font-weight:bold;
    }
    button.main {
        width:100%;
        padding:10px;
        margin-top:10px;
        border:none;
        border-radius:6px;
        background:#27ae60;
        color:white;
        font-size:18px;
        cursor:pointer;
        font-weight:bold;
    }
    .small-btn {
        width:48%;
        padding:8px;
        border:none;
        border-radius:6px;
        background:#34495e;
        color:white;
        font-size:14px;
        cursor:pointer;
        margin-top:6px;
    }
    .small-row {
        display:flex;
        justify-content:space-between;
        gap:4px;
    }
    .message {
        margin-top:10px;
        text-align:center;
        min-height:24px;
        color:#ffd93b;
        font-size:15px;
        text-shadow:0 0 6px #000;
    }

    .draw-panel-wrapper {
        width:290px;
        background:linear-gradient(#222b45,#050914);
        padding:10px;
        border-radius:14px;
        box-shadow:0 0 30px #000;
        border:3px solid #d4af37;
    }
    .draw-title {
        text-align:center;
        font-size:14px;
        margin-bottom:6px;
        color:#f0e9ff;
    }
    .draw-panel {
        display:flex;
        flex-wrap:wrap;
        gap:6px;
        justify-content:center;
        align-content:flex-start;
        min-height:150px;
    }
    .ball {
        width:34px;
        height:34px;
        border-radius:50%;
        background:white;
        color:black;
        display:flex;
        justify-content:center;
        align-items:center;
        font-weight:bold;
        font-size:14px;
        box-shadow:0 0 6px #000;
        animation:drop 0.3s ease-out;
    }
    .ball.last {
        border:2px solid #ffffff;
        box-shadow:0 0 12px #ffffff;
    }
    @keyframes drop {
        0% { transform:translateY(-40px); opacity:0; }
        100% { transform:translateY(0); opacity:1; }
    }

    .paytable {
        margin-top:8px;
        border-top:1px solid #223;
        padding-top:6px;
        font-size:13px;
    }
    .paytable-header,
    .paytable-row {
        display:flex;
        justify-content:space-between;
    }
</style>
</head>
<body>

<div class="wrapper">
    <div class="board" id="board"></div>

    <div class="right-column">
        <div class="panel">
            <div class="row"><span>CASH:</span><span id="balance">$500.00</span></div>
            <div class="row"><span>BET:</span><span id="bet">$0.25</span></div>
            <div class="row"><span>PICKS:</span><span id="pickCount">0</span></div>
            <div class="row"><span>HITS:</span><span id="hits">0</span></div>
            <div class="row"><span>LAST BALL HITS:</span><span id="lastBallHits">0</span></div>

            <div class="bet-row" id="betRow">
                <button class="bet-btn active" data-bet="0.25">$0.25</button>
                <button class="bet-btn" data-bet="0.5">$0.50</button>
                <button class="bet-btn" data-bet="1">$1</button>
                <button class="bet-btn" data-bet="2">$2</button>
                <button class="bet-btn" data-bet="5">$5</button>
                <button class="bet-btn" data-bet="10">$10</button>
            </div>

            <div class="small-row">
                <button class="small-btn" id="wipe">Wipe Card</button>
                <button class="small-btn" id="quick">Quick Pick</button>
            </div>

            <button class="main" id="spin">SPIN</button>

            <div class="message" id="msg">Pick 2–10 numbers</div>

            <div class="paytable">
                <div class="paytable-header">
                    <span>HITS</span><span>PAYS (× BET)</span>
                </div>
                <div id="paytableBody"></div>
            </div>
        </div>

        <div class="draw-panel-wrapper">
            <div class="draw-title">BALLS DRAWN</div>
            <div class="draw-panel" id="drawPanel"></div>
        </div>
    </div>
</div>

<script>
// audio
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function tone(f,d,t="sine",g=0.1){if(!audioCtx)return;const o=audioCtx.createOscillator(),ga=audioCtx.createGain();o.type=t;o.frequency.value=f;ga.gain.value=g;o.connect(ga);ga.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);}
function click(){tone(950,0.05,"square",0.08);}
function drop(){tone(520,0.07,"triangle",0.06);}
function hit(){tone(980,0.12,"square",0.09);}
function superball(){
    if(!audioCtx)return;
    const n=audioCtx.currentTime;
    const o1=audioCtx.createOscillator(),g1=audioCtx.createGain();
    o1.type="sawtooth";
    o1.frequency.setValueAtTime(380,n);
    o1.frequency.linearRampToValueAtTime(1300,n+0.18);
    g1.gain.setValueAtTime(0,n);
    g1.gain.linearRampToValueAtTime(0.14,n+0.05);
    g1.gain.linearRampToValueAtTime(0,n+0.23);
    o1.connect(g1);g1.connect(audioCtx.destination);
    o1.start(n);o1.stop(n+0.25);

    const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o2.type="square";
    o2.frequency.setValueAtTime(1600,n+0.18);
    g2.gain.setValueAtTime(0,n+0.18);
    g2.gain.linearRampToValueAtTime(0.18,n+0.2);
    g2.gain.linearRampToValueAtTime(0,n+0.32);
    o2.connect(g2);g2.connect(audioCtx.destination);
    o2.start(n+0.18);o2.stop(n+0.34);
}
function winSound(){tone(700,0.15,"triangle",0.08);setTimeout(()=>tone(1000,0.15,"triangle",0.08),160);}

// state
const board=document.getElementById("board");
const balanceEl=document.getElementById("balance");
const betEl=document.getElementById("bet");
const pickCountEl=document.getElementById("pickCount");
const hitsEl=document.getElementById("hits");
const lastBallHitsEl=document.getElementById("lastBallHits");
const msgEl=document.getElementById("msg");
const paytableBody=document.getElementById("paytableBody");
const drawPanel=document.getElementById("drawPanel");
const betRow=document.getElementById("betRow");

let selected=new Set();
let drawing=false;
let balance=500;
let bet=0.25;
let lastBallHitCount=0;

const MIN=2,MAX=10,DRAW=20;

const pays={
 2:{2:12},
 3:{3:44,2:2},
 4:{4:100,3:5,2:1},
 5:{5:800,4:15,3:2},
 6:{6:1600,5:50,4:5,3:1},
 7:{7:7000,6:150,5:15,4:2},
 8:{8:15000,7:750,6:50,5:5},
 9:{9:40000,8:2000,7:100,6:10},
10:{10:1000,9:500,8:150,7:25,6:8,5:4,4:1}
};

function updateUI(){
 balanceEl.textContent="$"+balance.toFixed(2);
 pickCountEl.textContent=selected.size;
 renderPaytable();
}
function renderPaytable(){
 paytableBody.innerHTML="";
 const p=selected.size;
 const t=pays[p];
 if(!t){paytableBody.innerHTML="<span style='font-size:12px;'>Pick 2–10 numbers.</span>";return;}
 Object.entries(t).sort((a,b)=>a[0]-b[0]).forEach(([h,m])=>{
   const r=document.createElement("div");
   r.className="paytable-row";
   r.innerHTML=`<span>${h}</span><span>${m}</span>`;
   paytableBody.appendChild(r);
 });
}
function build(){
 for(let i=1;i<=80;i++){
   const c=document.createElement("div");
   c.className="cell";
   c.textContent=i;
   c.dataset.num=i;
   c.onclick=()=>{initAudio();click();toggle(i,c);};
   board.appendChild(c);
 }
}
function toggle(n,c){
 if(drawing)return;
 if(selected.has(n)){selected.delete(n);c.classList.remove("selected");}
 else{
   if(selected.size>=MAX){msgEl.textContent="Max 10 picks";return;}
   selected.add(n);c.classList.add("selected");
 }
 updateUI();
}
function wipe(){
 if(drawing)return;
 selected.clear();
 document.querySelectorAll(".cell").forEach(c=>c.classList.remove("selected","drawn","hit","superball"));
 hitsEl.textContent="0";
 msgEl.textContent="Card cleared";
 drawPanel.innerHTML="";
 updateUI();
}
function quick(){
 wipe();
 let count=Math.floor(Math.random()*(MAX-MIN+1))+MIN;
 let nums=[...Array(80).keys()].map(x=>x+1);
 shuffle(nums);
 for(let i=0;i<count;i++)selected.add(nums[i]);
 document.querySelectorAll(".cell").forEach(c=>{
   if(selected.has(+c.dataset.num))c.classList.add("selected");
 });
 msgEl.textContent="Quick Pick ready";
 updateUI();
}
function shuffle(a){
 for(let i=a.length-1;i>0;i--){
   const j=Math.floor(Math.random()*(i+1));
   [a[i],a[j]]=[a[j],a[i]];
 }
}
function spin(){
 if(drawing)return;
 initAudio();click();
 if(selected.size<MIN){msgEl.textContent="Pick at least 2 numbers";return;}
 if(balance<bet){msgEl.textContent="Not enough balance";return;}

 balance-=bet;updateUI();
 drawing=true;
 msgEl.textContent="Drawing...";
 hitsEl.textContent="0";
 document.querySelectorAll(".cell").forEach(c=>c.classList.remove("drawn","hit","superball"));
 drawPanel.innerHTML="";

 let nums=[...Array(80).keys()].map(x=>x+1);
 shuffle(nums);
 let drawn=nums.slice(0,DRAW);
 let idx=0,hits=0;

 let int=setInterval(()=>{
   if(idx>=DRAW){
     clearInterval(int);
     finish(hits,drawn[DRAW-1]);
     drawing=false;
     return;
   }
   let n=drawn[idx];
   let c=document.querySelector(`.cell[data-num="${n}"]`);
   c.classList.add("drawn");

   const b=document.createElement("div");
   b.className="ball";
   b.textContent=n;
   if(idx===DRAW-1)b.classList.add("last");
   drawPanel.appendChild(b);

   drop();

   if(selected.has(n)){
     c.classList.add("hit");
     hits++;
     hitsEl.textContent=hits;
     hit();
   }

   if(idx===DRAW-1){
     c.classList.add("superball");
     superball();
     setTimeout(()=>c.classList.remove("superball"),900);
   }

   idx++;
 },180);
}

function animateWin(amount){
 let current=0;
 let steps=70;
 let increment=amount/steps;
 let interval=setInterval(()=>{
   current+=increment;
   if(current>=amount){
     current=amount;
     clearInterval(interval);
   }
   msgEl.textContent="WIN: $"+current.toFixed(2);
 },20);
}

function finish(h,last){
 let p=selected.size;
 let payout=0;

 if(pays[p]&&pays[p][h])payout=pays[p][h]*bet;

 let lastBallHit=selected.has(last);

 if(lastBallHit && payout>0){
   payout*=4;
   lastBallHitCount++;
   lastBallHitsEl.textContent=lastBallHitCount;
 }

 if(payout>0){
   balance+=payout;

   if(lastBallHit || payout>=50*bet){
     animateWin(payout);
   }else{
     msgEl.textContent="WIN: $"+payout.toFixed(2);
   }

   winSound();
 }else{
   msgEl.textContent="No win";
 }

 updateUI();
}

document.getElementById("wipe").onclick=()=>{initAudio();click();wipe();};
document.getElementById("quick").onclick=()=>{initAudio();click();quick();};
document.getElementById("spin").onclick=spin;

betRow.onclick=e=>{
 const btn=e.target.closest(".bet-btn");
 if(!btn)return;
 initAudio();click();
 bet=parseFloat(btn.dataset.bet);
 betEl.textContent="$"+bet.toFixed(2);
 document.querySelectorAll(".bet-btn").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
};

build();
updateUI();
</script>

</body>
</html>
